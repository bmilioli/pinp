name: Release

# Publishing is driven by tags: push `v1.2.3` and this builds the DMG and
# attaches it to a GitHub Release of the same name.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    # Apple Silicon runner; the universal target cross-builds the Intel slice.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          generate_release_notes: true
