appId: com.brunomilioli.pinp
productName: pinp
directories:
  output: dist

files:
  - src/**/*
  - assets/**/*
  - package.json

mac:
  category: public.app-category.utilities
  # Generated from assets/icon.svg by scripts/make-icon.sh (npm run icon).
  # electron-builder copies it into Contents/Resources and writes the matching
  # CFBundleIconFile key — the Info.plist is never edited by hand here.
  icon: assets/icon.icns
  target:
    # Universal so one download covers both Apple Silicon and Intel Macs.
    - target: dmg
      arch: universal
  # Ad-hoc signature: no Apple Developer account, so the app is not notarized.
  # It runs anywhere, but Gatekeeper quarantines it on download — the README
  # tells users to run `xattr -cr /Applications/pinp.app` once. Needs Command
  # Line Tools only, no full Xcode. (The official code-signing doc's Xcode
  # prerequisite is about notarization.)
  identity: "-"
  # Critical: hardened runtime + ad-hoc signing turns on library validation,
  # which rejects the prebuilt Electron framework (different Team ID) and the
  # app simply refuses to launch.
  hardenedRuntime: false
  # Accessory/UIElement app: no Dock icon, no menu bar. Matches
  # app.setActivationPolicy('accessory') at runtime, so the Dock icon never
  # flashes during startup.
  extendInfo:
    LSUIElement: true
    # Google sign-in falls back to passkeys / security keys, which go over
    # Bluetooth. Chromium refuses to touch Bluetooth unless the bundle declares
    # a usage description — without these the FIDO path fails with
    # "does not have Bluetooth metadata in its Info.plist".
    NSBluetoothAlwaysUsageDescription: >-
      pinp uses Bluetooth to let you sign in with a passkey or security key.
    NSBluetoothPeripheralUsageDescription: >-
      pinp uses Bluetooth to let you sign in with a passkey or security key.
