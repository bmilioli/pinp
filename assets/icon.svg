<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!--
    pinp app icon — the "p in p" monogram: a small p nested inside the counter
    of a large p. 1024 canvas, 824 art box at (100,100) per Apple's template;
    the 100px margin holds the drop shadow.

    Geometry (no loose magic numbers — everything derives from these):
      outer p: bowl centre (512,417), outer radius 250, stroke 118
               -> counter radius = 250 - 118 = 132
               stem x 262..380 (262 = 512-250), y 167..857 (descender 190)
      inner p: bowl centre (512,393), outer radius 62, stroke 32
               stem x 450..482, y 331..503
      Furthest point of the inner p sits 106px from the counter centre,
      leaving ~26px of clearance inside the 132px counter.

    Rings are drawn as a stroked <circle> at the mean radius
    (outer radius - half the stroke), which keeps the counter perfectly round.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e1e24"/>
      <stop offset="1" stop-color="#08080a"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7b7bf0"/>
      <stop offset="1" stop-color="#4a4ac9"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="46"/>
    </filter>
    <clipPath id="tile">
      <rect x="100" y="100" width="824" height="824" rx="185" ry="185"/>
    </clipPath>
  </defs>

  <!-- tile -->
  <g filter="url(#shadow)">
    <rect x="100" y="100" width="824" height="824" rx="185" ry="185" fill="url(#bg)"/>
  </g>

  <g clip-path="url(#tile)">
    <!-- top sheen and a diffuse indigo halo behind the mark -->
    <rect x="100" y="100" width="824" height="824" fill="url(#sheen)"/>
    <g filter="url(#glow)" opacity="0.5">
      <circle cx="512" cy="417" r="191" fill="none" stroke="#5b5bd6" stroke-width="118"/>
    </g>

    <!-- outer p -->
    <circle cx="512" cy="417" r="191" fill="none" stroke="url(#ink)" stroke-width="118"/>
    <rect x="262" y="167" width="118" height="690" rx="30" fill="url(#ink)"/>

    <!-- inner p, sitting inside the counter -->
    <circle cx="512" cy="393" r="46" fill="none" stroke="#f4f4f5" stroke-width="32"/>
    <rect x="450" y="331" width="32" height="172" rx="11" fill="#f4f4f5"/>
  </g>

  <!-- hairline edge -->
  <rect x="101" y="101" width="822" height="822" rx="184" ry="184"
        fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="2"/>
</svg>
